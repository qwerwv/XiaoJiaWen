# ========================================
# eLuvLetter Ubuntu 24.04 Nginx配置
# 针对Ubuntu 24.04 64位系统优化
# ========================================

# 全局配置
user www-data;
worker_processes auto;

# Ubuntu 24.04 特定优化
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # 日志格式 - Ubuntu优化版本
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] "$request" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent" "$http_x_forwarded_for" "$upstream_response_time"';

    # Ubuntu专用日志路径
    access_log /var/log/nginx/access.log cloudflare;
    error_log /var/log/nginx/error.log;

    # MIME类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip压缩 - Ubuntu优化
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/font-woff
        application/font-woff2;

    # 上游服务器配置 - Ubuntu优化
    upstream eluvletter_backend {
        server 127.0.0.1:9091;
        keepalive 32;
        keepalive_timeout 60s;
    }

    # HTTP重定向到HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name qingning.icu www.qingning.icu;

        # Ubuntu 24.04 安全头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # 重定向到HTTPS和www
        return 301 https://www.qingning.icu$request_uri;
    }

    # HTTPS服务器配置 - Ubuntu优化
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name qingning.icu www.qingning.icu;

        # SSL配置 - Ubuntu 24.04推荐配置
        ssl_certificate /etc/ssl/certs/qingning.icu.crt;
        ssl_certificate_key /etc/ssl/private/qingning.icu.key;

        # Ubuntu 24.04 TLS优化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # HSTS安全头 - Ubuntu推荐
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Cloudflare真实IP配置 - Ubuntu专用
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 162.158.132.0/22;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 131.0.72.0/22;

        # IPv6 Cloudflare IPs
        set_real_ip_from 2400:cb00::/32;
        set_real_ip_from 2606:4700::/32;
        set_real_ip_from 2803:f800::/32;
        set_real_ip_from 2405:b500::/32;
        set_real_ip_from 2405:8100::/32;
        set_real_ip_from 2a06:98c0::/29;
        set_real_ip_from 2c0f:f248::/32;

        real_ip_header CF-Connecting-IP;
        real_ip_recursive on;

        # Ubuntu专用访问日志
        access_log /var/log/nginx/eluvletter.access.log cloudflare;
        error_log /var/log/nginx/eluvletter.error.log;

        # 静态文件服务 - Ubuntu优化
        location / {
            root /var/www/eluvletter;
            try_files $uri $uri/ /index.html;

            # Ubuntu缓存控制
            expires 1h;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
        }

        # 静态资源缓存 - Ubuntu优化
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            root /var/www/eluvletter;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";

            # Ubuntu 24.04 Brotli支持
            brotli_static on;
            gzip_static on;
        }

        # API反向代理 - Ubuntu优化
        location /api/ {
            proxy_pass http://eluvletter_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # Ubuntu专用代理头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Cloudflare特定头
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header CF-IPCountry $http_cf_ipcountry;
            proxy_set_header CF-RAY $http_cf_ray;

            # Ubuntu优化超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # 缓存控制 - 不缓存API响应
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;

            # Ubuntu性能优化
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket支持 - Ubuntu优化
        location /ws/ {
            proxy_pass http://eluvletter_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ubuntu WebSocket优化
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # 健康检查端点 - Ubuntu专用
        location /health {
            proxy_pass http://eluvletter_backend;
            access_log off;

            # Ubuntu安全限制
            allow 127.0.0.1;
            allow ::1;
            allow 172.64.0.0/13;  # Cloudflare IP范围
            deny all;
        }

        # 监控端点 - Ubuntu专用
        location /metrics {
            proxy_pass http://127.0.0.1:9092;

            # 仅允许本地访问
            allow 127.0.0.1;
            allow ::1;
            deny all;

            access_log off;
        }

        # 登录页面特殊处理
        location = /login {
            root /var/www/eluvletter;
            try_files /login.html =404;
            expires 30m;
        }

        # 错误页面 - Ubuntu优化
        error_page 404 /login.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Ubuntu安全限制
        location ~ /\. {
            deny all;
        }

        location ~* \.(env|config|sql|bak|backup)$ {
            deny all;
        }
    }

    # Ubuntu 24.04 速率限制配置
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    # 应用速率限制到API
    server {
        # ... 其他配置同上 ...

        location /api/login {
            limit_req zone=login burst=10 nodelay;
            # ... 其他代理配置 ...
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            # ... 其他代理配置 ...
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            limit_req zone=static burst=100 nodelay;
            # ... 其他静态文件配置 ...
        }
    }
}

# Ubuntu 24.04 性能调优参数
# 这些参数针对Ubuntu 24.04进行了优化
daemon off;  # 在容器环境中使用

# Ubuntu系统调优
worker_priority -5;
worker_cpu_affinity auto;

# Ubuntu 24.04 特定的性能优化
http {
    # 优化缓冲区
    client_body_buffer_size 128k;
    client_header_buffer_size 32k;
    client_max_body_size 20m;
    large_client_header_buffers 4 32k;

    # 优化代理缓冲
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Ubuntu 24.04 连接优化
    reset_timedout_connection on;
    client_header_timeout 15s;
    client_body_timeout 15s;
    send_timeout 15s;
}